<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Fit Email Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <img src="https://groupfitapp.com/email-assets/logo-square.png?v=2" alt="Group Fit" />
        <h1>Group Fit Email Generator</h1>
        <span>SendMails Theme</span>
      </div>
      <div class="header-actions">
        <button id="btn-view-code" class="btn btn-secondary">View HTML Code</button>
        <button id="btn-copy-html" class="btn">Copy SendMails HTML</button>
      </div>
    </header>

    <main class="app-container">
      <section class="editor-panel">
        <h2 class="panel-title">Email Configuration</h2>

        <div class="form-group">
          <label>Load Preset Email</label>
          <select id="preset-loader" class="form-control">
            <option value="trainer_leads" selected>Trainer Leads Announcement (Trainer)</option>
            <option value="trainer_preferences">Trainer Preferences Announcement (Customer)</option>
            <option value="trainer_activation">Trainer Profile Activation Sequence (Trainer)</option>
            <option value="custom">Custom Email</option>
          </select>
        </div>

        <div class="form-group">
          <label>Target Audience</label>
          <select id="audience" class="form-control">
            <option value="customer" selected>Customer Email (groupfitapp.com + App Store Badges)</option>
            <option value="trainer">Trainer Email (groupfitapp.com/trainer)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Subject Line</label>
          <input type="text" id="subject" class="form-control" />
        </div>

        <div class="form-group">
          <label>Preview Text</label>
          <input type="text" id="previewText" class="form-control" />
        </div>

        <div class="form-group">
          <label>Eyebrow Badge</label>
          <input type="text" id="eyebrow" class="form-control" />
        </div>

        <div class="form-group">
          <label>Main Heading (H1)</label>
          <input type="text" id="heading" class="form-control" />
        </div>

        <div class="form-group">
          <label>Lede Subtitle</label>
          <textarea id="lede" class="form-control"></textarea>
        </div>

        <div class="form-group">
          <label>Body Content</label>
          <textarea id="bodyBlocks" class="form-control" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label>Gate Box / Highlight Banner</label>
          <textarea id="gateBox" class="form-control"></textarea>
        </div>

        <div class="form-group">
          <label>Checklist Items (Title|Desc lines)</label>
          <textarea id="checklist" class="form-control" rows="5"></textarea>
        </div>

        <div class="form-group">
          <label>CTA Button Text</label>
          <input type="text" id="ctaText" class="form-control" />
        </div>

        <div class="form-group">
          <label>CTA Button Link</label>
          <input type="text" id="ctaUrl" class="form-control" />
        </div>

        <div class="form-group">
          <label>Callout Box Title</label>
          <input type="text" id="calloutTitle" class="form-control" />
        </div>

        <div class="form-group">
          <label>Callout Box Description</label>
          <textarea id="calloutDesc" class="form-control"></textarea>
        </div>

        <div class="form-group">
          <label>Custom Signature / Signoff</label>
          <textarea id="signoffHtml" class="form-control" placeholder="Leave empty for audience default"></textarea>
        </div>

        <div class="form-group">
          <label>Show App Download Badges</label>
          <select id="showAppBadges" class="form-control">
            <option value="auto">Auto (Show for Customers)</option>
            <option value="true">Force Show</option>
            <option value="false">Hide</option>
          </select>
        </div>

        <div class="form-group" style="margin-top: 10px;">
          <label>Paste Raw Text / Text File Importer</label>
          <textarea id="rawTextInput" class="form-control" rows="4" placeholder="Paste raw email text file content here to auto-fill fields..."></textarea>
          <button id="btn-import-raw" class="btn btn-secondary" style="margin-top: 6px; width: 100%; justify-content: center;">Import Raw Text into Generator</button>
        </div>
      </section>

      <section class="preview-panel">
        <div class="preview-toolbar">
          <div class="view-modes">
            <button class="view-btn active" id="mode-desktop">Desktop Preview</button>
            <button class="view-btn" id="mode-mobile">Mobile Preview</button>
          </div>
          <span style="color: var(--text-muted); font-size: 0.85rem;">Live SendMails Rendering</span>
        </div>
        <div class="preview-frame-wrap">
          <iframe id="preview-frame" title="Email Preview"></iframe>
        </div>
      </section>
    </main>

    <div id="modal-code" class="code-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Generated SendMails HTML Code</h3>
          <button id="btn-close-modal" class="btn btn-secondary">Close</button>
        </div>
        <div class="modal-body">
          <textarea id="code-output" readonly></textarea>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
